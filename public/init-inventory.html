<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Initialize Inventory</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        button {
            background-color: #dc2626;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 20px;
        }
        button:hover {
            background-color: #b91c1c;
        }
        .result {
            padding: 10px;
            border-radius: 4px;
            display: none;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .links {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
        }
        .links a {
            display: block;
            margin-bottom: 10px;
            color: #dc2626;
            text-decoration: none;
        }
        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h2>Initialize Blood Bank Inventory</h2>
    <p>This will create initial inventory data for all blood groups if it doesn't already exist.</p>
    
    <button onclick="initializeInventory()">Initialize Inventory</button>
    
    <div id="result" class="result"></div>

    <div class="links">
        <a href="/create-admin.html">Create Admin User</a>
        <a href="/">Go to Main Application</a>
    </div>

    <script>
        async function initializeInventory() {
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'none';
            resultDiv.className = 'result';
            
            try {
                const response = await fetch('/api/inventory/init', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                });
                
                const responseData = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <strong>Success!</strong><br>
                        Inventory initialized with ${responseData.inventory.length} blood groups.<br>
                        <small>You can now proceed to create an admin user and login to the system.</small>
                    `;
                    resultDiv.classList.add('success');
                } else {
                    resultDiv.textContent = 'Error: ' + responseData.error;
                    resultDiv.classList.add('error');
                }
            } catch (error) {
                resultDiv.textContent = 'Error: ' + error.message;
                resultDiv.classList.add('error');
            }
            
            resultDiv.style.display = 'block';
        }
    </script>
</body>
</html>
